<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <defs>
    <linearGradient id="pj-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07070e"/>
      <stop offset="100%" stop-color="#0d1120"/>
    </linearGradient>
    <linearGradient id="pj-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="15%" stop-color="#ff4d6a"/>
      <stop offset="85%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="pj-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="pj-glow-r">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ff4d6a" flood-opacity="0.3"/>
    </filter>
    <filter id="pj-glow-p">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#a855f7" flood-opacity="0.3"/>
    </filter>
    <filter id="pj-glow-c">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00d4ff" flood-opacity="0.3"/>
    </filter>
    <filter id="pj-glow-y">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f59e0b" flood-opacity="0.3"/>
    </filter>
    <pattern id="pj-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.5" fill="#1e293b" opacity="0.3"/>
    </pattern>
    <clipPath id="pj-clip">
      <rect width="900" height="340" rx="10"/>
    </clipPath>
  </defs>

  <style>
    @keyframes pj-shimmer {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    .pj-shimmer { animation: pj-shimmer 4s ease-in-out infinite; }
  </style>

  <g clip-path="url(#pj-clip)">
    <!-- Background -->
    <rect width="900" height="340" fill="url(#pj-bg)"/>
    <rect width="900" height="340" fill="url(#pj-grid)"/>

    <!-- Section header -->
    <text x="450" y="38" text-anchor="middle" font-family="'Courier New', 'Consolas', monospace" font-size="13" fill="#8b949e" letter-spacing="6">
      <tspan fill="#ff4d6a">{</tspan> FEATURED PROJECTS <tspan fill="#00d4ff">}</tspan>
    </text>
    <rect x="100" y="50" width="700" height="1" fill="url(#pj-accent)" opacity="0.3"/>

    <!-- Project 1: CastleSolver -->
    <g filter="url(#pj-shadow)">
      <rect x="40" y="68" width="400" height="110" rx="8" fill="#0d1117" stroke="#ff4d6a" stroke-width="1" stroke-opacity="0.3"/>
      <rect x="40" y="68" width="4" height="110" rx="2" fill="#ff4d6a" opacity="0.7"/>
      <!-- Status indicator -->
      <circle cx="415" cy="85" r="4" fill="#ff4d6a" opacity="0.5" class="pj-shimmer"/>
      <!-- Title -->
      <text x="60" y="95" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#e6edf3">CastleSolver</text>
      <!-- Description -->
      <text x="60" y="115" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Reverse-engineered Castle.io anti-bot challenge</text>
      <text x="60" y="128" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">solver. Used by Twitter, Rockstar Games.</text>
      <!-- Tags -->
      <rect x="60" y="142" width="55" height="18" rx="3" fill="#ff4d6a" opacity="0.12"/>
      <text x="87" y="155" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#ff4d6a">reverse</text>
      <rect x="122" y="142" width="48" height="18" rx="3" fill="#ff4d6a" opacity="0.12"/>
      <text x="146" y="155" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#ff4d6a">solver</text>
      <rect x="177" y="142" width="52" height="18" rx="3" fill="#f7df1e" opacity="0.12"/>
      <text x="203" y="155" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#f7df1e">Python</text>
    </g>

    <!-- Project 2: UberEats Device Data -->
    <g filter="url(#pj-shadow)">
      <rect x="460" y="68" width="400" height="110" rx="8" fill="#0d1117" stroke="#a855f7" stroke-width="1" stroke-opacity="0.3"/>
      <rect x="460" y="68" width="4" height="110" rx="2" fill="#a855f7" opacity="0.7"/>
      <circle cx="835" cy="85" r="4" fill="#a855f7" opacity="0.5" class="pj-shimmer" style="animation-delay: -1s"/>
      <text x="480" y="95" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#e6edf3">UberEats Device Data</text>
      <text x="480" y="115" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Full script reversal and fingerprinting</text>
      <text x="480" y="128" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">signal extraction from UberEats client.</text>
      <rect x="480" y="142" width="70" height="18" rx="3" fill="#a855f7" opacity="0.12"/>
      <text x="515" y="155" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#a855f7">fingerprint</text>
      <rect x="557" y="142" width="58" height="18" rx="3" fill="#a855f7" opacity="0.12"/>
      <text x="586" y="155" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#a855f7">analysis</text>
      <rect x="622" y="142" width="40" height="18" rx="3" fill="#f7df1e" opacity="0.12"/>
      <text x="642" y="155" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#f7df1e">JS</text>
    </g>

    <!-- Project 3: Riot Mobile 2FA Bypass -->
    <g filter="url(#pj-shadow)">
      <rect x="40" y="196" width="400" height="110" rx="8" fill="#0d1117" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
      <rect x="40" y="196" width="4" height="110" rx="2" fill="#00d4ff" opacity="0.7"/>
      <circle cx="415" cy="213" r="4" fill="#00d4ff" opacity="0.5" class="pj-shimmer" style="animation-delay: -2s"/>
      <text x="60" y="223" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#e6edf3">Riot Mobile 2FA</text>
      <text x="60" y="243" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Device fingerprinting and 2FA verification</text>
      <text x="60" y="256" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">analysis on Riot Games mobile client.</text>
      <rect x="60" y="270" width="72" height="18" rx="3" fill="#00d4ff" opacity="0.12"/>
      <text x="96" y="283" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#00d4ff">device-fp</text>
      <rect x="139" y="270" width="35" height="18" rx="3" fill="#00d4ff" opacity="0.12"/>
      <text x="156" y="283" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#00d4ff">2FA</text>
      <rect x="181" y="270" width="52" height="18" rx="3" fill="#3776ab" opacity="0.12"/>
      <text x="207" y="283" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#3776ab">Python</text>
    </g>

    <!-- Project 4: Boba Blitz -->
    <g filter="url(#pj-shadow)">
      <rect x="460" y="196" width="400" height="110" rx="8" fill="#0d1117" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
      <rect x="460" y="196" width="4" height="110" rx="2" fill="#f59e0b" opacity="0.7"/>
      <circle cx="835" cy="213" r="4" fill="#f59e0b" opacity="0.5" class="pj-shimmer" style="animation-delay: -3s"/>
      <text x="480" y="223" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#e6edf3">Boba Blitz</text>
      <text x="480" y="243" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Published slot game built with PixiJS.</text>
      <text x="480" y="256" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Live on Stake.com platform.</text>
      <rect x="480" y="270" width="46" height="18" rx="3" fill="#f59e0b" opacity="0.12"/>
      <text x="503" y="283" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#f59e0b">game</text>
      <rect x="533" y="270" width="42" height="18" rx="3" fill="#f59e0b" opacity="0.12"/>
      <text x="554" y="283" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#f59e0b">PixiJS</text>
      <rect x="582" y="270" width="36" height="18" rx="3" fill="#3178c6" opacity="0.12"/>
      <text x="600" y="283" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#3178c6">TS</text>
    </g>

    <!-- Border -->
    <rect width="900" height="340" rx="10" fill="none" stroke="#1a1a30" stroke-width="1"/>
  </g>
</svg>
