<svg xmlns="http://www.w3.org/2000/svg" width="900" height="30" viewBox="0 0 900 30">
  <defs>
    <linearGradient id="div-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="15%" stop-color="#ff4d6a" stop-opacity="0.4"/>
      <stop offset="35%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="65%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="85%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="div-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main line -->
  <rect x="80" y="14" width="740" height="1" fill="url(#div-grad)" filter="url(#div-glow)"/>

  <!-- Center diamond -->
  <rect x="446" y="11" width="8" height="8" rx="1" fill="#a855f7" opacity="0.6" transform="rotate(45 450 15)" filter="url(#div-glow)"/>

  <!-- Side dots -->
  <circle cx="120" cy="15" r="1.5" fill="#ff4d6a" opacity="0.4"/>
  <circle cx="780" cy="15" r="1.5" fill="#00d4ff" opacity="0.4"/>
</svg>
