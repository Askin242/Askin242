<svg xmlns="http://www.w3.org/2000/svg" width="900" height="50" viewBox="0 0 900 50">
  <defs>
    <linearGradient id="sh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07070e"/>
      <stop offset="100%" stop-color="#0d1120"/>
    </linearGradient>
    <linearGradient id="sh-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="15%" stop-color="#ff4d6a"/>
      <stop offset="85%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <pattern id="sh-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.5" fill="#1e293b" opacity="0.3"/>
    </pattern>
    <clipPath id="sh-clip">
      <rect width="900" height="50" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#sh-clip)">
    <rect width="900" height="50" fill="url(#sh-bg)"/>
    <rect width="900" height="50" fill="url(#sh-grid)"/>
    <text x="450" y="32" text-anchor="middle" font-family="'Courier New', 'Consolas', monospace" font-size="13" fill="#8b949e" letter-spacing="6">
      <tspan fill="#ff4d6a">$</tspan> GITHUB ANALYTICS <tspan fill="#00d4ff">_</tspan>
    </text>
    <rect x="100" y="44" width="700" height="1" fill="url(#sh-accent)" opacity="0.3"/>
    <rect width="900" height="50" rx="10" fill="none" stroke="#1a1a30" stroke-width="1"/>
  </g>
</svg>
