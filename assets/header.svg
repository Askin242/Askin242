<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07070e"/>
      <stop offset="50%" stop-color="#0d1120"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="15%" stop-color="#ff4d6a"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="85%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4d6a"/>
      <stop offset="50%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.6" fill="#1e293b" opacity="0.4"/>
    </pattern>
    <clipPath id="round-clip">
      <rect width="900" height="200" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round-clip)">
    <rect width="900" height="200" fill="url(#bg)"/>
    <rect width="900" height="200" fill="url(#grid)"/>

    <!-- Accent lines -->
    <rect x="80" y="48" width="740" height="1.5" fill="url(#accent-h)" opacity="0.5"/>
    <rect x="80" y="152" width="740" height="1.5" fill="url(#accent-h)" opacity="0.5"/>

    <!-- Title -->
    <text x="450" y="95" text-anchor="middle" font-family="'Courier New', 'Consolas', monospace" font-size="38" font-weight="bold" fill="#e6edf3" letter-spacing="10" filter="url(#text-glow)">SYLVESTRE GRAZIANI</text>

    <!-- Tagline -->
    <text x="450" y="125" text-anchor="middle" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#6e7681" letter-spacing="2" font-style="italic">"I break it. I study it. I rebuild it."</text>

    <!-- Border -->
    <rect width="900" height="200" rx="10" fill="none" stroke="#1a1a30" stroke-width="1"/>
  </g>
</svg>
