<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120">
  <defs>
    <linearGradient id="ft-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07070e"/>
      <stop offset="100%" stop-color="#0d1120"/>
    </linearGradient>
    <linearGradient id="ft-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="15%" stop-color="#ff4d6a"/>
      <stop offset="85%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="ft-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="ft-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.5" fill="#1e293b" opacity="0.3"/>
    </pattern>
    <clipPath id="ft-clip">
      <rect width="900" height="120" rx="10"/>
    </clipPath>
  </defs>

  <style>
    @keyframes ft-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .ft-pulse { animation: ft-pulse 3s ease-in-out infinite; }
  </style>

  <g clip-path="url(#ft-clip)">
    <!-- Background -->
    <rect width="900" height="120" fill="url(#ft-bg)"/>
    <rect width="900" height="120" fill="url(#ft-grid)"/>

    <!-- Top accent line -->
    <rect x="100" y="10" width="700" height="1" fill="url(#ft-accent)" opacity="0.4"/>

    <!-- Section label -->
    <text x="450" y="38" text-anchor="middle" font-family="'Courier New', 'Consolas', monospace" font-size="11" fill="#6e7681" letter-spacing="4">CONNECT</text>

    <!-- GitHub -->
    <g>
      <rect x="145" y="52" width="130" height="36" rx="6" fill="#161b22" stroke="#e6edf3" stroke-width="0.5" stroke-opacity="0.2"/>
      <circle cx="170" cy="70" r="8" fill="#e6edf3" opacity="0.1"/>
      <text x="170" y="74" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#e6edf3" font-weight="bold">G</text>
      <text x="220" y="74" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#e6edf3">GitHub</text>
    </g>

    <!-- LinkedIn -->
    <g>
      <rect x="310" y="52" width="130" height="36" rx="6" fill="#161b22" stroke="#0a66c2" stroke-width="0.5" stroke-opacity="0.3"/>
      <circle cx="335" cy="70" r="8" fill="#0a66c2" opacity="0.15"/>
      <text x="335" y="74" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#0a66c2" font-weight="bold">in</text>
      <text x="385" y="74" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#e6edf3">LinkedIn</text>
    </g>

    <!-- Telegram -->
    <g>
      <rect x="475" y="52" width="130" height="36" rx="6" fill="#161b22" stroke="#26a5e4" stroke-width="0.5" stroke-opacity="0.3"/>
      <circle cx="500" cy="70" r="8" fill="#26a5e4" opacity="0.15"/>
      <text x="500" y="74" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#26a5e4" font-weight="bold">T</text>
      <text x="550" y="74" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#e6edf3">Telegram</text>
    </g>

    <!-- Portfolio -->
    <g>
      <rect x="640" y="52" width="130" height="36" rx="6" fill="#161b22" stroke="#ff4d6a" stroke-width="0.5" stroke-opacity="0.3"/>
      <circle cx="665" cy="70" r="8" fill="#ff4d6a" opacity="0.15"/>
      <text x="665" y="74" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#ff4d6a" font-weight="bold">W</text>
      <text x="715" y="74" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#e6edf3">Portfolio</text>
    </g>

    <!-- Bottom text -->
    <text x="450" y="108" text-anchor="middle" font-family="'Courier New', 'Consolas', monospace" font-size="9" fill="#30363d" letter-spacing="2">Made with &#x2665; - Sylvestre</text>

    <!-- Border -->
    <rect width="900" height="120" rx="10" fill="none" stroke="#1a1a30" stroke-width="1"/>
  </g>
</svg>
